<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Dashboard</title>
    <link rel="stylesheet" href="static/css/style.css" />
    <script src="https://jsdelivr.net"></script>
</head>
    
<body>
<!-- SIDEBAR -->
<div class="sidebar">
    <div class="sidebar-logo">
        <span class="logo-icon">🎓</span>
        <span class="logo-text">EduAdmin</span>
    </div>
    <nav class="sidebar-nav">
        <!-- FIXED: Added th:href to ensure proper routing -->
        <a th:href="@{/}" class="nav-link active">
            <span class="nav-icon">📊</span> Dashboard
        </a>
        <!-- FIXED: Added th:href to ensure proper routing -->
        <a th:href="@{/new}" class="nav-link">
            <span class="nav-icon">➕</span> Add Student
        </a>
    </nav>
</div>

<!-- MAIN CONTENT -->
<div class="main-content">

    <!-- TOP BAR -->
    <div class="topbar">
        <h1 class="page-title">Dashboard</h1>
        <!-- FIXED: Added th:href to ensure proper routing -->
        <a th:href="@{/new}" class="btn btn-primary">+ Add Student</a>
    </div>

    <!-- STAT CARDS -->
    <div class="stats-grid">
        <div class="stat-card blue">
            <div class="stat-icon">👥</div>
            <div class="stat-info">
                <div class="stat-value" th:text="${totalStudents}">0</div>
                <div class="stat-label">Total Students</div>
            </div>
        </div>
        <div class="stat-card green">
            <div class="stat-icon">✅</div>
            <div class="stat-info">
                <div class="stat-value" th:text="${activeStudents}">0</div>
                <div class="stat-label">Active Students</div>
            </div>
        </div>
        <div class="stat-card red">
            <div class="stat-icon">❌</div>
            <div class="stat-info">
                <div class="stat-value" th:text="${inactiveStudents}">0</div>
                <div class="stat-label">Inactive Students</div>
            </div>
        </div>
    </div>

    <!-- CHART + TABLE SECTION -->
    <div class="content-grid">

        <!-- COURSE CHART -->
        <div class="card chart-card">
            <div class="card-header">
                <h2 class="card-title">Course Enrollment</h2>
                <span class="card-subtitle">Top courses by student count</span>
            </div>
            <div class="chart-wrapper">
                <canvas id="courseChart"></canvas>
            </div>
        </div>

        <!-- STUDENT TABLE -->
        <div class="card table-card">
            <div class="card-header">
                <h2 class="card-title">All Students</h2>
                <span class="card-subtitle" th:text="${totalStudents} + ' students enrolled'"></span>
            </div>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Course</th>
                            <th>Phone</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="student, iterStat : ${listStudents}">
                            <td th:text="${iterStat.count}"></td>
                            <td>
                                <div class="student-name-cell">
                                    <div class="avatar" th:text="${#strings.substring(student.name, 0, 1)}"></div>
                                    <span th:text="${student.name}"></span>
                                </div>
                            </td>
                            <td th:text="${student.email}"></td>
                            <td>
                                <span class="course-badge" th:text="${student.course}"></span>
                            </td>
                            <td th:text="${student.phone}"></td>
                            <td>
                                <span class="status-badge"
                                      th:classappend="${student.status == 'Active'} ? 'status-active' : 'status-inactive'"
                                      th:text="${student.status}">
                                </span>
                            </td>
                            <td>
                                <div class="action-btns">
                                    <a th:href="@{/edit/{id}(id=${student.id})}" class="btn btn-edit">Edit</a>
                                    <a th:href="@{/delete/{id}(id=${student.id})}"
                                       onclick="return confirm('Delete this student?')"
                                       class="btn btn-delete">Delete</a>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(listStudents)}">
                            <td colspan="7" class="empty-row">No students found. Click "Add Student" to get started.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>
</div>

<!-- CHART SCRIPT -->
<script th:inline="javascript">
    const labels = /*[[${courseLabels}]]*/ [];
    const counts = /*[[${courseCounts}]]*/ [];

    const ctx = document.getElementById('courseChart').getContext('2d');
    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{
                label: 'Students Enrolled',
                data: counts,
                backgroundColor: [
                    'rgba(99, 102, 241, 0.8)',
                    'rgba(34, 197, 94, 0.8)',
                    'rgba(251, 191, 36, 0.8)',
                    'rgba(239, 68, 68, 0.8)',
                    'rgba(14, 165, 233, 0.8)',
                    'rgba(168, 85, 247, 0.8)'
                ],
                borderRadius: 8,
                borderSkipped: false
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { display: false }
            },
            scales: {
                y: {
                    beginAtZero: true,
                    ticks: { stepSize: 1 },
                    grid: { color: 'rgba(0,0,0,0.05)' }
                },
                x: {
                    grid: { display: false }
                }
            }
        }
    });
</script>

</body>
</html>
